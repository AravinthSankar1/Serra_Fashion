<!DOCTYPE html>
<html>

<head>
  <title>Qikink Sync to Serra</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: #fafafa;
      color: #111;
    }

    .header {
      background: #111;
      color: white;
      padding: 18px 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .header p {
      font-size: 11px;
      color: #aaa;
      margin-top: 4px;
    }

    .body {
      padding: 20px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 7px;
      font-size: 12px;
      background: white;
      color: #111;
      outline: none;
      transition: border 0.15s;
    }

    input:focus {
      border-color: #111;
    }

    .hint {
      font-size: 10px;
      color: #999;
      margin-top: 5px;
    }

    .btn {
      background: #111;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #333;
    }

    .btn:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    #status {
      margin-top: 14px;
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      min-height: 18px;
      line-height: 1.5;
    }

    .success {
      color: #10b981;
    }

    .error {
      color: #ef4444;
    }

    .info {
      color: #3b82f6;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>Serra Qikink Sync</h1>
    <p>One-click import from Qikink</p>
  </div>
  <div class="body">
    <div class="field">
      <label>Backend URL</label>
      <input type="text" id="serverUrl" placeholder="https://your-api.com/api/v1">
      <div class="hint">Use your Render URL ending in <b>/api/v1</b></div>
    </div>
    <button id="scrapeBtn" class="btn">⇪ Sync Products to Serra</button>
    <div id="status"></div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
